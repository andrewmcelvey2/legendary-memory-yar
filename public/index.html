<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quebec Mini App</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">

    <style>
        #gameArea {
            height: 350px;
            border: 2px solid #ccc;
            position: relative;
            margin-top: 20px;
        }

        #target {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            position: absolute;
            display: none;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <span class="navbar-brand">Reaction Challenge</span>
        </div>
    </nav>

    <header class="container text-center mt-4">
        <h1>Reaction Challenge</h1>
        <p>Click the target before time runs out. Each round gets faster.</p>
    </header>

    <main class="container my-4">

        <div class="row">

            <div class="col-md-8">

                <label class="form-label">Player Name</label>
                <input id="playerName" class="form-control" placeholder="Enter your name">

                <br>

                <button id="startGame" class="btn btn-primary">Start Game</button>

                <h4 class="mt-3">Score: <span id="scoreDisplay">0</span></h4>
                <h6>Time Limit: <span id="timeDisplay">1500</span> ms</h6>

                <div id="gameArea">
                    <button id="target" class="btn btn-danger"></button>
                </div>

                <br>

                <button id="submitScore" class="btn btn-success" disabled>Submit Score</button>

            </div>

            <div class="col-md-4">

                <h3>Leaderboard</h3>

                <div id="leaderboard-container">
                    Scores will load here
                </div>

            </div>

        </div>

    </main>

    <footer class="text-center bg-light py-3">
        <small>Reaction Game Mini App</small>
    </footer>

    <script>

        let score = 0
        let timeLimit = 1500
        let gameActive = false
        let timeoutID

        const startBtn = document.getElementById("startGame")
        const target = document.getElementById("target")
        const scoreDisplay = document.getElementById("scoreDisplay")
        const timeDisplay = document.getElementById("timeDisplay")
        const gameArea = document.getElementById("gameArea")
        const submitBtn = document.getElementById("submitScore")

        startBtn.addEventListener("click", startGame)
        target.addEventListener("click", targetClicked)

        function startGame() {

            score = 0
            timeLimit = 1500
            gameActive = true

            scoreDisplay.textContent = score
            timeDisplay.textContent = timeLimit

            submitBtn.disabled = true

            spawnTarget()

        }

        function spawnTarget() {

            if (!gameActive) return

            const maxX = gameArea.clientWidth - 70
            const maxY = gameArea.clientHeight - 70

            const x = Math.random() * maxX
            const y = Math.random() * maxY

            target.style.left = x + "px"
            target.style.top = y + "px"

            target.style.display = "block"

            timeoutID = setTimeout(endGame, timeLimit)

        }

        function targetClicked() {

            if (!gameActive) return

            clearTimeout(timeoutID)

            score++
            timeLimit = Math.max(400, timeLimit - 100)

            scoreDisplay.textContent = score
            timeDisplay.textContent = timeLimit

            spawnTarget()

        }

        function endGame() {

            gameActive = false
            target.style.display = "none"

            alert("Game Over! Score: " + score)

            submitBtn.disabled = false

        }

        submitBtn.addEventListener("click", submitScore)

        async function submitScore() {

            const name = document.getElementById("playerName").value

            if (!name) {
                alert("Enter your name")
                return
            }

            const scoreData = {
                playerName: name,
                score: score
            }

            await fetch('/api/scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(scoreData)
            })

            loadScores()

        }

        async function loadScores() {

            const res = await fetch('/api/scores')
            const scores = await res.json()

            let html = "<ul class='list-group'>"

            scores.forEach(s => {

                html += `<li class="list-group-item">
${s.playerName} - ${s.score}
</li>`

            })

            html += "</ul>"

            document.getElementById("leaderboard-container").innerHTML = html

        }

        loadScores()

    </script>

</body>

</html>
